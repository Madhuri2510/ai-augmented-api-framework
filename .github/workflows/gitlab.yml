name: Playwright API Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, uat, prod]
  schedule:
    - cron: '0 6 * * *'   # Nightly against dev

jobs:
  api-tests:
    name: Tests (${{ matrix.env }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # On push/PR run dev only; manual dispatch uses the chosen env
        env:
          - ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright API tests (${{ matrix.env }})
        run: npm run test:${{ matrix.env }}
        env:
          # Override env-file values with CI secrets when set
          BOOKER_USERNAME:  ${{ secrets.BOOKER_USERNAME }}
          BOOKER_PASSWORD:  ${{ secrets.BOOKER_PASSWORD }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          CI: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.env }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.env }}-${{ github.run_id }}
          path: reports/test-results.json
          retention-days: 30

      - name: Generate AI test summary
        if: always() && env.OPENAI_API_KEY != ''
        run: node scripts/analyze-report.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        continue-on-error: true

      - name: Upload AI summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-summary-${{ matrix.env }}-${{ github.run_id }}
          path: reports/ai-summary.md
          retention-days: 30

      - name: Post test summary
        if: always()
        run: |
          echo "## 🎭 Playwright Results — ${{ matrix.env }}" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/test-results.json ]; then
            python3 -c "
          import json, sys
          data = json.load(open('reports/test-results.json'))
          def count(suites):
              p,f,s=0,0,0
              for suite in suites:
                  for spec in suite.get('specs',[]):
                      for test in spec.get('tests',[]):
                          st=test.get('results',[{}])[0].get('status','')
                          if st=='passed': p+=1
                          elif st=='failed': f+=1
                          elif st=='skipped': s+=1
                  p2,f2,s2=count(suite.get('suites',[]))
                  p+=p2;f+=f2;s+=s2
              return p,f,s
          p,f,s=count(data.get('suites',[]))
          print(f' Passed: {p} |  Failed: {f} | ⏭ Skipped: {s}')
            " >> $GITHUB_STEP_SUMMARY
          fi

  # Run UAT automatically after dev passes on main
  promote-to-uat:
    name: Tests (uat) — post-merge smoke
    runs-on: ubuntu-latest
    needs: api-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20.x', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run UAT smoke tests
        run: npm run test:uat
        env:
          BOOKER_USERNAME: ${{ secrets.BOOKER_USERNAME }}
          BOOKER_PASSWORD: ${{ secrets.BOOKER_PASSWORD }}
          OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-uat-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
